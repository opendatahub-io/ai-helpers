name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.x'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make shellcheck

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff PyYAML

    - name: Install skill-linter
      run: npm install -g skill-linter

    - name: Run lint
      run: make lint

    - name: Run skill-linter with GitHub annotations
      if: always()
      run: npx skill-linter check helpers/skills/*/ --strict --format github