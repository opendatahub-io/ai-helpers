product_id: rhoai
display_name: Red Hat OpenShift AI
jira:
  project_keys: [RHOAIENG]
  version_field: fixVersions
  component_field: components
context_sources:
  - source_type: architecture_context
    repo: opendatahub-io/architecture-context
    description: "Component design docs with API contracts and integration patterns. Relevant when ticket references a component with architecture docs."
    branch_hint: main
    path_hints:
      - "architecture/rhoai-{version}/{component}.md"
  - source_type: documentation
    repo: opendatahub-io/opendatahub-documentation
    description: "Published AsciiDoc modules and assemblies. Provides existing writing style, module structure, and feature coverage. Always relevant for documentation review and gap analysis."
    always_include: true
    branch_hint: main
    path_hints:
      - "modules/**/*.adoc"
      - "assemblies/**/*.adoc"
  - source_type: operator_manifests
    repo: red-hat-data-services/rhods-operator
    description: "RHOAI operator CRD Go types and ClusterServiceVersion manifests. Provides authoritative API schema for DataScienceCluster, DSCInitialization, and component CRDs. Always relevant for operator-related documentation."
    always_include: true
    branch_hint: main
    path_hints:
      - "api/**/*_types.go"
      - "config/manifests/**/*.yaml"
      - "config/rhoai/manifests/**/*.yaml"
version_mappings:
  - jira_version_pattern: "rhoai-(\\d+\\.\\d+)(?:\\.(?:EA|GA)\\d*)?"
    branch_template: "release-{version}"
component_source_defaults:
  branch_hint: main
  path_hints:
    - "README.md"
    - "config/crd/**/*.yaml"
    - "api/**/*_types.go"
component_resolver:
  type: static
  components:
    - key: argo-workflows
      repo: red-hat-data-services/argo-workflows
      jira_names: [Argo Workflows]
