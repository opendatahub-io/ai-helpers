  framework: asciidoc-modular
  attribute_files: [_artifacts/document-attributes-global.adoc]
  module_prefixes:
    concept: "con_"
    procedure: "proc_"
    reference: "ref_"
    assembly: "assembly_"
    snippet: "snip_"
  variants: [upstream, self-managed]
  vale_config:
    type: discover
validators: [yaml_syntax, vale]
